name: Publish iscn-authenticator to PyPI

on:
  push:
    tags:
      - "v*-py"
      # Avoid matching v*-py-client (handled by publish-pypi-client.yml).
      - "!v*-py-client"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python scripts/verify-pypi-tag.py

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: twine check
        run: python -m twine check dist/*

      - name: Smoke test wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "
          from iscn_authenticator import is_valid_karyotype
          assert is_valid_karyotype('46,XX') is True
          print('smoke ok')
          "

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload --non-interactive dist/*
